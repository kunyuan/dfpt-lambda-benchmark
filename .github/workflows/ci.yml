name: selfcheck
on: [push, pull_request]
jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: L1 (α²F→λ) host self-check
        run: bash L1-alpha2F-to-lambda/scripts/selfcheck.sh
      - name: L3 PoC (DFPT λ) host self-check
        run: bash L3-dfpt-lambda/poc-simple-metal/scripts/selfcheck.sh
